<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Details</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="weather-card">

<h1>SkyCast</h1>

<h2 id="city"></h2>

<img id="weatherIcon" alt="Weather Icon">

<h1 id="temperature">28°C</h1>

<p id="condition">broken cloud</p>

<div class="details">

    <div class="detail-card">
        <h3>Humidity</h3>
        <p id="humidity">82%</p>
    </div>

    <div class="detail-card">
        <h3>Wind</h3>
        <p id="wind"></p>
    </div>

    <div class="detail-card">
        <h3>Pressure</h3>
        <p id="pressure"></p>
    </div>

    <div class="detail-card">
        <h3>Visibility</h3>
        <p id="visibility">10km</p>
    </div>

    <div class="detail-card">
        <h3>Clouds</h3>
        <p id="clouds"></p>
    </div>

    <div class="detail-card">
        <h3>Sunrise</h3>
        <p id="sunrise">--</p>
    </div>

    <div class="detail-card">
        <h3>Sunset</h3>
        <p id="sunset"></p>
    </div>

</div>


</div>

<script src="script.js"></script>

</body>
</html>
